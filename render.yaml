services:
  - type: web
    name: holiday-homes-price-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.app_flask:app
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PROJECT_LOGIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
